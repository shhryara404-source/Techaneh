name: Techaneh quality and security checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "22"}
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Rebuild indexable output and knowledge
        run: node build-seo-pages.mjs
      - name: Validate JavaScript and public site
        run: |
          node --check config.js
          node --check assets/app.js
          node --check assets/v5-preflight.js
          node --check assets/v5.js
          node --check assets/v6.js
          node --check worker/src/index.js
          node --check worker/dashboard-worker.js
          node --check build-seo-pages.mjs
          node scripts/validate_site.mjs
      - name: Validate Python agents
        run: python -m py_compile scripts/*.py
      - name: Check required public files
        run: |
          test -s index.html
          test -s favicon.svg
          test -s robots.txt
          test -s sitemap.xml
          test -s feed.xml
          test -s feed.json
          test -s opensearch.xml
          test -s manifest.webmanifest
          test -s data/knowledge.json
          grep -q '<urlset' sitemap.xml
          grep -q '<rss' feed.xml
      - name: Reject accidentally committed secrets
        shell: bash
        run: |
          if grep -RInE '(sk-[A-Za-z0-9_-]{20,}|AIza[0-9A-Za-z_-]{30,}|tvly-[A-Za-z0-9_-]{20,}|gnews_[A-Za-z0-9_-]{20,})' . \
            --exclude-dir=.git --exclude-dir=__pycache__ --exclude='*.png' --exclude='*.webp' --exclude='*.zip'; then
            echo 'Possible API secret found in repository.'
            exit 1
          fi
