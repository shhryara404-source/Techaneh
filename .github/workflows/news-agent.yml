name: Hourly bilingual news agent

on:
  schedule:
    # Non-zero minute reduces peak-time queueing. GitHub cron uses UTC.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: techaneh-content-pipeline
  cancel-in-progress: false

jobs:
  create-news:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.AGENTS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TEXT_AI_PROVIDERS: ${{ vars.TEXT_AI_PROVIDERS || 'deepseek,github_models' }}
      DEEPSEEK_ARTICLES_API_KEY: ${{ secrets.DEEPSEEK_ARTICLES_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4o-mini' }}
      SEARCH_PROVIDERS: ${{ vars.SEARCH_PROVIDERS || 'gnews,tavily,tavily_keyless,hacker_news' }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      ARTICLE_INTERVAL_HOURS: ${{ vars.ARTICLE_INTERVAL_HOURS || '1' }}
      ARTICLE_BATCH_SIZE: ${{ vars.ARTICLE_BATCH_SIZE || '1' }}
      MIN_EDITORIAL_SCORE: ${{ vars.MIN_EDITORIAL_SCORE || '82' }}
      IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER || 'cloudflare' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_IMAGE_MODEL: ${{ vars.CLOUDFLARE_IMAGE_MODEL || '@cf/black-forest-labs/flux-1-schnell' }}
      MIN_IMAGE_EDITORIAL_SCORE: ${{ vars.MIN_IMAGE_EDITORIAL_SCORE || '92' }}
      MAX_IMAGES_PER_RUN: "2"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -r requirements.txt
      - name: Create validated bilingual article(s)
        run: python scripts/hourly_news_agent.py
      - name: Generate optional AI cover(s)
        run: python scripts/image_agent.py
      - name: Rebuild SEO pages, feeds, and sitemap
        run: node build-seo-pages.mjs
      - name: Validate public output
        run: node scripts/validate_site.mjs
      - name: Commit validated changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Nothing new passed the editorial gates."
            exit 0
          fi
          git config user.name "Techaneh Editorial Agent"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "content: publish validated bilingual technology update"
          git pull --rebase origin main
          git push origin HEAD:main
