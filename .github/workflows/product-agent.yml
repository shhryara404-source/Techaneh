name: Monthly product comparison data agent

on:
  schedule:
    - cron: "53 5 3 * *"
  workflow_dispatch:
    inputs:
      product_names:
        description: "Comma-separated exact product names"
        required: false
        type: string
      category:
        description: "Optional product category hint"
        required: false
        type: choice
        options: ["", "Phone", "Laptop", "Tablet", "GPU", "Console", "Audio", "Wearable", "Monitor"]

permissions:
  contents: write
  models: read

concurrency:
  group: techaneh-content-pipeline
  cancel-in-progress: false

jobs:
  refresh-products:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.AGENTS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TEXT_AI_PROVIDERS: ${{ vars.TEXT_AI_PROVIDERS || 'deepseek,github_models' }}
      DEEPSEEK_ARTICLES_API_KEY: ${{ secrets.DEEPSEEK_ARTICLES_API_KEY }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4o-mini' }}
      SEARCH_PROVIDERS: ${{ vars.SEARCH_PROVIDERS || 'gnews,tavily,tavily_keyless,hacker_news' }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      PRODUCT_NAMES: ${{ inputs.product_names || '' }}
      PRODUCT_CATEGORY: ${{ inputs.category || '' }}
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - uses: actions/setup-node@v4
        with: {node-version: "22"}
      - run: pip install -r requirements.txt
      - run: python scripts/product_agent.py
      - run: node build-seo-pages.mjs
      - run: node scripts/validate_site.mjs
      - name: Commit product catalog
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "Techaneh Product Agent"
          git config user.email "actions@users.noreply.github.com"
          git add products.js config/products-watchlist.json data/knowledge.json sitemap.xml feed.xml feed.json llms.txt fa en
          git commit -m "data: refresh source-backed comparison catalog"
          git pull --rebase origin main
          git push origin HEAD:main
